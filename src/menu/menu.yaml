    # ─── НАГРЕВ (портальные виджеты) ─────────────────────────
    - id: heating
      type: submenu
      title: { ru: "НАГРЕВ", en: "HEATING" }
      children:
        - id: heat_start
          type: action
          title: { ru: "ВКЛЮЧИТЬ", en: "HEAT START" }
          on_invoke: heat_start
          role: iheater.heat_start
          widget: HeaterControl

        - id: heat_stop
          type: action
          title: { ru: "ВЫКЛЮЧИТЬ", en: "HEAT STOP" }
          on_invoke: heat_stop
          role: iheater.heat_stop

    - id: logs
      type: submenu
      title: { ru: "ЛОГИ", en: "LOGS" }
      children:
        - id: log_portal_enabled
          type: toggle
          title: { ru: "ПОРТАЛ", en: "PORTAL" }
          vtype: bool
          bind: log_portal
          persist: true
          scope: global
          default: false

        - id: log_printer_enabled
          type: toggle
          title: { ru: "ПРИНТЕР", en: "PRINTER" }
          vtype: bool
          bind: log_printer
          persist: true
          scope: global
          default: false

        - id: log_device_enabled
          type: toggle
          title: { ru: "УСТРОЙСТВО", en: "DEVICE" }
          vtype: bool
          bind: log_device
          persist: true
          scope: global
          default: false

        - id: log_debug_enabled
          type: toggle
          title: { ru: "DEBUG", en: "DEBUG" }
          vtype: bool
          bind: log_debug
          persist: true
          scope: global
          default: false

    - id: units_count
      type: value
      title: { ru: "КОЛ-ВО ЮНИТОВ", en: "UNITS" }
      vtype: uint8
      min: 1
      max: 1
      step: 1
      bind: units_count
      persist: true
      scope: global
      default: 1

    - id: language
      type: value
      title: { ru: "ЯЗЫК", en: "LANGUAGE" }
      vtype: uint8
      min: 0
      max: 1
      step: 1
      bind: language
      persist: true
      scope: global
      default: 1
