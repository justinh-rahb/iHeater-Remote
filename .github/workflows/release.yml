name: Release firmware

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish firmware
    runs-on: ubuntu-latest

    env:
      PIO_ENV: esp32c3-super-mini-remote
      PRODUCT_NAME: iHeater-Remote
      BOARD_NAME: esp32c3-super-mini

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio pyserial

      - name: Build firmware
        run: pio run -e "$PIO_ENV"

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          build_dir=".pio/build/${PIO_ENV}"
          dist_dir="dist"
          base="${PRODUCT_NAME}-${tag}-${BOARD_NAME}"
          boot_app0="${HOME}/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          esptool="${HOME}/.platformio/packages/tool-esptoolpy/esptool.py"

          mkdir -p "$dist_dir/package"

          cp "$build_dir/firmware.bin" "$dist_dir/${base}-firmware.bin"
          cp "$build_dir/bootloader.bin" "$dist_dir/package/bootloader.bin"
          cp "$build_dir/partitions.bin" "$dist_dir/package/partitions.bin"
          cp "$build_dir/firmware.bin" "$dist_dir/package/firmware.bin"
          cp "$boot_app0" "$dist_dir/package/boot_app0.bin"

          python "$esptool" --chip esp32c3 merge_bin \
            -o "$dist_dir/${base}-factory.bin" \
            0x0 "$dist_dir/package/bootloader.bin" \
            0x8000 "$dist_dir/package/partitions.bin" \
            0xe000 "$dist_dir/package/boot_app0.bin" \
            0x10000 "$dist_dir/package/firmware.bin"

          cat > "$dist_dir/package/manifest.json" <<EOF
          {
            "name": "iHeater Remote (${BOARD_NAME})",
            "version": "${tag#v}",
            "tag": "${tag}",
            "environment": "${PIO_ENV}",
            "chip": "ESP32-C3",
            "parts": [
              { "file": "bootloader.bin", "offset": "0x0" },
              { "file": "partitions.bin", "offset": "0x8000" },
              { "file": "boot_app0.bin", "offset": "0xe000" },
              { "file": "firmware.bin", "offset": "0x10000" }
            ]
          }
          EOF

          (cd "$dist_dir/package" && zip -9 "../${base}-flash-bundle.zip" ./*)

          cat > "$dist_dir/release-notes.md" <<EOF
          Automated firmware build for ${tag}.

          Assets:
          - \`${base}-firmware.bin\`: app firmware image for flashing at offset \`0x10000\`.
          - \`${base}-factory.bin\`: merged ESP32-C3 image containing bootloader, partitions, boot_app0, and firmware.
          - \`${base}-flash-bundle.zip\`: individual flash parts plus an offset manifest.
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.bin dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.bin dist/*.zip \
              --title "iHeater Remote ${tag}" \
              --notes-file dist/release-notes.md
          fi
