; Menu generation:       extra_scripts/pre_gen_menu.py + lib/idryer-core/menu/menu_gen.py
; [env] +  [flags_*] + [env:*]
; extra_scripts в [env:*] перезапписывает [env],
; а не дополняет, поэтому pre + post
; нужно указывать явно в каждом env.

[platformio]
default_envs = esp32c3-devkitm-prod, esp32c3-super-mini-prod, xiao-esp32s3-prod, waveshare-esp32s3-zero-prod

[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem112101
monitor_port = /dev/cu.usbmodem112101
monitor_speed = 115200
monitor_raw = yes

lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^6.21.3
  https://github.com/jnthas/Improv-WiFi-Library.git
  links2004/WebSockets @ ^2.4.0

[flags_iheater]
build_flags =
  -DDEBUG_SERIAL=Serial
  -Iinclude                       ;для secrets.h
  -Isrc/menu                      ;для autogen menu
  -DIHEATER_TRIGGER_OUTPUT_PIN=3  ;RMT pulse output gpio esp32 -> iHeater Trigger port. 

; USB CDC (нативный USB) — для super-mini, XIAO S3, Waveshare S3 Zero.
; Devkit ESP32-C3 (esp32c3-devkitm-prod/-stage) использует UART через CH340/CP2102 — без CDC.
[flags_usb_cdc]
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[flags_prod]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DIDRYER_API_BASE=\"https://portal.idryer.org/api\"
  -DMQTT_BROKER=\"mqtt.idryer.org\"
  -DMQTT_PORT=8883
  -DMQTT_USE_TLS=1

[flags_stage]
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DIDRYER_API_BASE=\"https://staging.idryer.org/api\"
  -DMQTT_BROKER=\"staging.idryer.org\"
  -DMQTT_PORT=1884
  -DMQTT_USE_TLS=0

[flags_local]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DIDRYER_API_BASE=\"http://192.168.1.27:3000\"
  -DMQTT_BROKER=\"192.168.1.27\"
  -DMQTT_PORT=1883
  -DMQTT_USE_TLS=0

[env:esp32c3-devkitm-prod]
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_prod.build_flags}

[env:esp32c3-stage]
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_stage.build_flags}

[env:esp32c3-super-mini-prod]
; board_upload.erase_flash = yes  ; РАЗОВО: стереть NVS. Раскомментировать при необходимости.
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[env:esp32c3-super-mini-stage]
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_stage.build_flags}

; Local dev — без copy_firmware (flasher-portal) и без auto_claim.
; Устройство клеймится вручную через монитор порта.
[env:esp32c3-super-mini-local]
; upload_port = /dev/cu.usbmodem1143101
; monitor_port = /dev/cu.usbmodem1143101
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_local.build_flags}

[env:esp32c3-super-mini-dev]
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}
  -DCORE_DEBUG_LEVEL=3       ; override prod=0 для dev-логов
  -DIDRYER_DEV_REPL=1

[env:esp32c3-super-mini-local-dev]
; upload_port = /dev/cu.usbmodem11401
; monitor_port = /dev/cu.usbmodem11401
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_local.build_flags}
  -DCORE_DEBUG_LEVEL=3
  -DIDRYER_DEV_REPL=1

[env:xiao-esp32s3-prod]
board = seeed_xiao_esp32s3
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[env:xiao-esp32s3-stage]
board = seeed_xiao_esp32s3
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/stage_auto_claim.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_stage.build_flags}


; Waveshare ESP32-S3 Zero Официального board ID нет — используем esp32-s3-devkitc-1 с 4MB flash.
[env:waveshare-esp32s3-zero-prod]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/post_build.py
build_flags =
  ${flags_iheater.build_flags}
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[env:waveshare-esp32s3-zero-stage]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
extra_scripts =
  pre:extra_scripts/pre_gen_menu.py
  post:extra_scripts/stage_auto_claim.py
